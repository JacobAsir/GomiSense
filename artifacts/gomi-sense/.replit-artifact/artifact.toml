kind = "web"
previewPath = "/"
title = "GomiSense"
version = "1.0.0"
id = "artifacts/gomi-sense"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20898

[services.development]
run = "pnpm --filter @workspace/gomi-sense run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gomi-sense", "run", "build" ]
publicDir = "artifacts/gomi-sense/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20898"
BASE_PATH = "/"
