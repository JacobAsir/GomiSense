services:
  # --- Backend: Node.js Web Service ---
  - type: web
    name: gomisense-backend
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server build
    startCommand: cd artifacts/api-server && node --enable-source-maps ./dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false # Set in Render Dashboard
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: NODE_VERSION
        value: 20

  # --- Frontend: Static Site ---
  - type: web
    name: gomisense-frontend
    runtime: static
    plan: free
    # Combine install and build into one command for Static Sites
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/gomi-sense build
    staticPublishPath: ./artifacts/gomi-sense/dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        fromService:
          type: web
          name: gomisense-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
